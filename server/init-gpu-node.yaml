---
# init-gpu-node.yaml — configure the PC node (RTX 4060, 8GB VRAM, Ryzen 5 5600X, 32GB RAM) for GPU workloads.
# Joins the EXISTING kubeadm cluster managed by this (eightbitsaxlounge/server) layer.
#
# Prerequisites (done manually):
#   - Ubuntu 24.04 LTS installed on a dedicated drive
#   - openssh-server installed and running (sudo apt install openssh-server && sudo systemctl enable --now ssh)
#   - PC connected to GS308E switch, DHCP reservation set in Deco app (same IP as Windows boot)
#   - [gpu_nodes] entry exists in console Pi's /etc/ansible/hosts (via ansiblehosts.j2)
#
# Run FROM 1972-console (after make init-gpu has set up SSH key access):
#   cd ~/nineteenseventytwo-eightbitsaxlounge/server
#   make init-gpu

- name: Configure GPU node
  hosts: gpu_nodes
  become: true
  vars:
    kubernetes_version: "1.35"   # Must match init-kubernetes.yaml
    ansible_user: mchellmer
    nvidia_ctk_keyring: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

  tasks:

    # -------------------------------------------------------------------------
    # Disable swap — required by kubeadm
    # -------------------------------------------------------------------------
    - name: Install dphys-swapfile
      ansible.builtin.apt:
        name: dphys-swapfile
        state: present

    - name: Disable and uninstall dphys-swapfile
      ansible.builtin.shell: |
        dphys-swapfile swapoff && \
        dphys-swapfile uninstall && \
        systemctl disable dphys-swapfile

    # -------------------------------------------------------------------------
    # System baseline — mirrors init-nodes.yaml pattern
    # -------------------------------------------------------------------------
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: Install common utilities
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - htop
          - python3-pip
          - open-iscsi
        state: present

    # -------------------------------------------------------------------------
    # Kubernetes packages — same version as cluster (see init-kubernetes.yaml)
    # -------------------------------------------------------------------------
    - name: Download and dearmor Kubernetes GPG key
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key |
          gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes APT repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
        filename: kubernetes
        state: present

    - name: Install Kubernetes packages
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - kubernetes-cni
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # NVIDIA drivers (ubuntu-drivers picks the right series for Ada Lovelace)
    # -------------------------------------------------------------------------
    - name: Install ubuntu-drivers-common
      ansible.builtin.apt:
        name: ubuntu-drivers-common
        state: present

    - name: Auto-install recommended NVIDIA driver
      ansible.builtin.command:
        cmd: ubuntu-drivers autoinstall
      register: driver_install_result
      changed_when: "'already installed' not in driver_install_result.stdout"
      failed_when: driver_install_result.rc != 0

    - name: Check if reboot is needed after driver install
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if driver install requires it
      ansible.builtin.reboot:
        reboot_timeout: 600
        connect_timeout: 10
        pre_reboot_delay: 5
        post_reboot_delay: 30
        test_command: systemctl is-active sshd
      when: reboot_required.stat.exists

    # -------------------------------------------------------------------------
    # NVIDIA Container Toolkit
    # -------------------------------------------------------------------------
    - name: Download NVIDIA container toolkit GPG key (armored)
      ansible.builtin.get_url:
        url: https://nvidia.github.io/libnvidia-container/gpgkey
        dest: /tmp/nvidia-ctk-gpgkey.asc
        mode: "0644"

    - name: Dearmor NVIDIA GPG key
      ansible.builtin.command:
        cmd: gpg --dearmor -o {{ nvidia_ctk_keyring }} /tmp/nvidia-ctk-gpgkey.asc
        creates: "{{ nvidia_ctk_keyring }}"

    - name: Set permissions on NVIDIA keyring
      ansible.builtin.file:
        path: "{{ nvidia_ctk_keyring }}"
        mode: "0644"

    - name: Add NVIDIA container toolkit apt repository
      ansible.builtin.shell:
        cmd: |
          curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
            | sed 's#deb https://#deb [signed-by={{ nvidia_ctk_keyring }}] https://#g' \
            | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Install NVIDIA container toolkit
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # Configure containerd to use NVIDIA runtime
    # -------------------------------------------------------------------------
    - name: Configure NVIDIA runtime for containerd
      ansible.builtin.command:
        cmd: nvidia-ctk runtime configure --runtime=containerd
      notify: Restart containerd

    # -------------------------------------------------------------------------
    # iptables bridge config — same as k8s_iptables role in init-nodes.yaml
    # -------------------------------------------------------------------------
    - name: Load br_netfilter module
      community.general.modprobe:
        name: br_netfilter
        state: present

    - name: Persist br_netfilter module
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: "br_netfilter\n"
        mode: "0644"

    - name: Set iptables bridge sysctl params
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }

    # -------------------------------------------------------------------------
    # Join the existing kubeadm cluster
    # The master saves its join command to /root/kubeadm_join_command.sh
    # (see init-kubernetes.yaml)
    # -------------------------------------------------------------------------
    - name: Fetch join command from master
      ansible.builtin.fetch:
        src: /root/kubeadm_join_command.sh
        dest: /tmp/kubeadm_join_command.sh
        flat: true
      delegate_to: "{{ groups['master'][0] }}"
      run_once: true

    - name: Check if node has already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Copy join command to GPU node
      ansible.builtin.copy:
        src: /tmp/kubeadm_join_command.sh
        dest: /home/{{ ansible_user }}/kubeadm_join_command.sh
        mode: "0700"
        owner: "{{ ansible_user }}"
      when: not kubelet_conf.stat.exists

    - name: Join GPU node to Kubernetes cluster
      ansible.builtin.shell: /home/{{ ansible_user }}/kubeadm_join_command.sh
      when: not kubelet_conf.stat.exists

    # -------------------------------------------------------------------------
    # NVIDIA device plugin — exposes nvidia.com/gpu resource to Kubernetes
    # Runs from localhost (console Pi) where kubectl is available
    # -------------------------------------------------------------------------
    - name: Deploy NVIDIA device plugin DaemonSet
      ansible.builtin.command:
        cmd: >
          kubectl apply -f
          https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/v0.15.0/deployments/static/nvidia-device-plugin.yml
      delegate_to: localhost
      become: false
      run_once: true

    # -------------------------------------------------------------------------
    # Label node for scheduler targeting
    # -------------------------------------------------------------------------
    - name: Label node for LLM workloads
      ansible.builtin.command:
        cmd: kubectl label node {{ inventory_hostname }} workload=llm gpu=true --overwrite
      delegate_to: localhost
      become: false

    # -------------------------------------------------------------------------
    # Firewall — kubeadm worker ports (same logic as Pi nodes)
    # -------------------------------------------------------------------------
    - name: Install ufw
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow kubelet API
      community.general.ufw:
        rule: allow
        port: "10250"
        proto: tcp

    - name: Allow Flannel VXLAN
      community.general.ufw:
        rule: allow
        port: "8472"
        proto: udp

    - name: Enable ufw
      community.general.ufw:
        state: enabled
        policy: deny

    # -------------------------------------------------------------------------
    # Tailscale — remote access while travelling
    # Skipped if tailscale_auth_key is not provided.
    # Pass via: make init-gpu TAILSCALE_AUTH_KEY=tskey-auth-...
    # -------------------------------------------------------------------------
    - name: Download Tailscale apt keyring
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"
      when: tailscale_auth_key is defined

    - name: Add Tailscale apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
        filename: tailscale
        state: present
      when: tailscale_auth_key is defined

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true
      when: tailscale_auth_key is defined

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started
      when: tailscale_auth_key is defined

    - name: Connect to tailnet
      ansible.builtin.command:
        cmd: tailscale up --authkey={{ tailscale_auth_key }} --accept-routes
      changed_when: true
      when: tailscale_auth_key is defined

    - name: Show Tailscale IP
      ansible.builtin.command:
        cmd: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      when: tailscale_auth_key is defined

    - name: Print Tailscale IP
      ansible.builtin.debug:
        msg: "Tailscale IP: {{ tailscale_ip.stdout }}"
      when: tailscale_auth_key is defined

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
