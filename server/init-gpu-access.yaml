---
# init-gpu-access.yaml — one-time SSH key bootstrap for the GPU node.
# Mirrors the pattern in init-nodes.yaml but targets gpu_nodes.
#
# Prerequisites (the only manual step on a fresh Ubuntu desktop install):
#   sudo apt install openssh-server && sudo systemctl enable --now ssh
#
# Then from 1972-console:
#   make init-gpu
#
# Uses --ask-pass so Ansible authenticates with mchellmer's password,
# generates the cluster SSH key (if missing), and installs it in authorized_keys.
# After this, all subsequent Ansible runs use key auth (password only needed for -K sudo).

- name: Setup SSH keys for GPU node
  hosts: localhost, gpu_nodes
  vars:
    ansible_user: mchellmer
    ansible_user_dir: "/home/mchellmer"
    ssh_key_path: "{{ ansible_user_dir }}/.ssh/id_rsa"
    ssh_pub_key_path: "{{ ssh_key_path }}.pub"
  tasks:
    - name: Remove stale known_hosts entries for GPU node (fresh OS install changes host keys)
      ansible.builtin.known_hosts:
        name: "{{ item }}"
        state: absent
      loop: "{{ groups['gpu_nodes'] }}"
      delegate_to: localhost
      run_once: true

    - name: Remove stale known_hosts entries by IP
      ansible.builtin.known_hosts:
        name: "{{ hostvars[item]['ansible_host'] | default(item) }}"
        state: absent
      loop: "{{ groups['gpu_nodes'] }}"
      delegate_to: localhost
      run_once: true

    - name: Generate SSH key pair on localhost (no-op if already exists)
      openssh_keypair:
        path: "{{ ssh_key_path }}"
        force: false
      delegate_to: localhost
      run_once: true

    - name: Copy SSH public key from localhost to GPU node
      copy:
        src: "{{ ssh_pub_key_path }}"
        dest: "/tmp/id_rsa.pub"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

- name: Install SSH key on GPU node
  hosts: gpu_nodes
  become: true
  vars:
    ansible_user: mchellmer
  tasks:
    - name: Install ssh key to node
      authorized_key:
        user: "{{ ansible_user }}"
        state: present
        key: "{{ lookup('file', '/tmp/id_rsa.pub') }}"
