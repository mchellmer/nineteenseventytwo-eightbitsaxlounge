---
# setup-tailscale.yaml — install and connect Tailscale on target hosts.
#
# Requires a Tailscale auth key passed as an extra var:
#   ansible-playbook setup-tailscale.yaml -e tailscale_auth_key=tskey-auth-...
#
# Or via make:
#   make setup-tailscale TAILSCALE_AUTH_KEY=tskey-auth-...
#
# Generate an auth key at: https://login.tailscale.com/admin/settings/keys
# Use a reusable, ephemeral key so nodes auto-register and auto-expire when removed.
#
# After running, nodes are accessible via their Tailscale IP (100.x.x.x) or MagicDNS
# hostname from any device on your tailnet — including your Mac while travelling.
#
# To also reach the local subnet (192.168.68.0/24) via the console Pi as a subnet
# router, run: tailscale up --advertise-routes=192.168.68.0/24 on 1972-console
# and approve it at https://login.tailscale.com/admin/machines

- name: Install and connect Tailscale
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  vars:
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}"

  tasks:
    - name: Fail if no auth key provided
      ansible.builtin.fail:
        msg: "tailscale_auth_key is required. Pass it with -e tailscale_auth_key=tskey-auth-... or set TAILSCALE_AUTH_KEY env var."
      when: tailscale_auth_key == ""

    - name: Download Tailscale install script
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"

    - name: Add Tailscale apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
        filename: tailscale
        state: present

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Connect to tailnet
      ansible.builtin.command:
        cmd: tailscale up --authkey={{ tailscale_auth_key }} --accept-routes
      register: tailscale_up
      changed_when: tailscale_up.rc == 0
      failed_when: tailscale_up.rc != 0

    - name: Show Tailscale IP
      ansible.builtin.command:
        cmd: tailscale ip -4
      register: tailscale_ip
      changed_when: false

    - name: Print Tailscale IP
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} Tailscale IP: {{ tailscale_ip.stdout }}"
