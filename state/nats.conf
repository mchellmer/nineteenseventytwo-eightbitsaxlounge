port: 4222
http: 8222
server_name: nats

authorization {
  users = [
    {
      user: "overlay"
      password: $OVERLAY_PASS
      permissions: {
        publish: ["overlay.>"]
        subscribe: ["ui.effect>"]
      }
    }
    {
      user: "ui"
      password: $UI_PASS
      permissions: {
        publish: ["ui.>"]
        subscribe: []
      }
    }
    {
      user: "midi"
      password: $MIDI_PASS
      permissions: {
        publish: ["midi.>"]
        subscribe: []
      }
    }
    {
      user: "data"
      password: $DATA_PASS
      permissions: {
        publish: ["data.>"]
        subscribe: []
      }
    }
  ]
}

jetstream {
  store_dir: "/data/jetstream"
  max_mem_store: 64MB
  max_file_store: 200MB
}

