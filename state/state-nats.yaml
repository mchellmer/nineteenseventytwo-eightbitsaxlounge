---
- name: Deploy NATS JetStream to Kubernetes
  hosts: master
  tasks:
    - name: Ensure required environment variables are provided
      ansible.builtin.assert:
        that:
          - lookup('env','NAMESPACE') | length > 0
          - lookup('env','VERSION') | length > 0
          - lookup('env','SYSTEM_PASS') | length > 0
          - lookup('env','OVERLAY_PASS') | length > 0
          - lookup('env','UI_PASS') | length > 0
          - lookup('env','MIDI_PASS') | length > 0
          - lookup('env','DATA_PASS') | length > 0
          - lookup('env','GITHUB_REPOSITORY_OWNER') | length > 0
        fail_msg: "Missing required env vars: NAMESPACE, VERSION, GITHUB_REPOSITORY_OWNER and all PASS vars"

    - name: Display deployment info
      ansible.builtin.debug:
        msg:
          - "Deploying NATS state version {{ lookup('env', 'VERSION') }}"
          - "Namespace: {{ lookup('env', 'NAMESPACE') }}"

    - name: Create a temporary directory for manifests
      ansible.builtin.tempfile:
        state: directory
        suffix: nats-k8s
      register: tempdir

    - name: Copy StatefulSet manifest to temp directory
      ansible.builtin.copy:
        src: k8s/statefulset.yaml
        dest: "{{ tempdir.path }}/statefulset.yaml"

    - name: Copy NATS headless service to temp directory
      ansible.builtin.copy:
        src: k8s/service-headless.yaml
        dest: "{{ tempdir.path }}/service-headless.yaml"

    - name: Copy NATS client service to temp directory
      ansible.builtin.copy:
        src: k8s/service-client.yaml
        dest: "{{ tempdir.path }}/service-client.yaml"

    - name: Create NATS credentials secret
      ansible.builtin.shell: |
        kubectl create secret generic state-nats-creds \
          --from-literal=system_pass="${SYSTEM_PASS}" \
          --from-literal=overlay_pass="${OVERLAY_PASS}" \
          --from-literal=ui_pass="${UI_PASS}" \
          --from-literal=midi_pass="${MIDI_PASS}" \
          --from-literal=data_pass="${DATA_PASS}" \
          --namespace $NAMESPACE \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        NAMESPACE: "{{ lookup('env', 'NAMESPACE') }}"
        SYSTEM_PASS: "{{ lookup('env','SYSTEM_PASS') }}"
        OVERLAY_PASS: "{{ lookup('env','OVERLAY_PASS') }}"
        UI_PASS: "{{ lookup('env','UI_PASS') }}"
        MIDI_PASS: "{{ lookup('env','MIDI_PASS') }}"
        DATA_PASS: "{{ lookup('env','DATA_PASS') }}"
      changed_when: false

    - name: Deploy NATS manifests (ordered)
      ansible.builtin.shell: |
        kubectl apply -n $NAMESPACE -f {{ tempdir.path }}/service-headless.yaml
        kubectl apply -n $NAMESPACE -f {{ tempdir.path }}/service-client.yaml
        kubectl apply -n $NAMESPACE -f {{ tempdir.path }}/statefulset.yaml
      environment:
        NAMESPACE: "{{ lookup('env', 'NAMESPACE') }}"

    - name: Patch StatefulSet image to versioned tag
      ansible.builtin.shell: |
        IMAGE_BASE=${IMAGE_BASE:-ghcr.io/${GITHUB_REPOSITORY_OWNER}/eightbitsaxlounge-state}
        kubectl -n "$NAMESPACE" set image sts/eightbitsaxlounge-state \
          nats="${IMAGE_BASE}:${VERSION}"
      environment:
        NAMESPACE: "{{ lookup('env', 'NAMESPACE') }}"
        VERSION: "{{ lookup('env', 'VERSION') }}"
        GITHUB_REPOSITORY_OWNER: "{{ lookup('env', 'GITHUB_REPOSITORY_OWNER') }}"
        IMAGE_BASE: "{{ lookup('env', 'IMAGE_BASE') | default('', true) }}"

    - name: Annotate StatefulSet with change cause
      ansible.builtin.shell: |
        kubectl -n "$NAMESPACE" annotate sts/eightbitsaxlounge-state \
          kubernetes.io/change-cause="state ${VERSION}" --overwrite
      environment:
        NAMESPACE: "{{ lookup('env', 'NAMESPACE') }}"
        VERSION: "{{ lookup('env', 'VERSION') }}"

    - name: Restart StatefulSet to pick up changes
      ansible.builtin.shell: |
        kubectl -n "$NAMESPACE" rollout restart sts/eightbitsaxlounge-state
      environment:
        NAMESPACE: "{{ lookup('env', 'NAMESPACE') }}"

    - name: Wait for StatefulSet rollout
      ansible.builtin.shell: |
        kubectl -n "$NAMESPACE" rollout status sts/eightbitsaxlounge-state --timeout=180s
      environment:
        NAMESPACE: "{{ lookup('env', 'NAMESPACE') }}"

    - name: Verify running image
      ansible.builtin.shell: |
        kubectl -n "$NAMESPACE" get sts eightbitsaxlounge-state -o jsonpath='{.spec.template.spec.containers[0].image}'
      register: sts_image
      environment:
        NAMESPACE: "{{ lookup('env', 'NAMESPACE') }}"

    - name: Print running image
      ansible.builtin.debug:
        msg: "StatefulSet image: {{ sts_image.stdout }}"

    - name: Verify PVCs created
      ansible.builtin.shell: |
        kubectl -n $NAMESPACE get pvc -l app=eightbitsaxlounge,component=state -o wide
      register: pvc_list
      environment:
        NAMESPACE: "{{ lookup('env', 'NAMESPACE') }}"
      changed_when: false

    - name: Print PVCs
      ansible.builtin.debug:
        var: pvc_list.stdout_lines

    - name: Remove temporary directory
      ansible.builtin.file:
        path: "{{ tempdir.path }}"
        state: absent
