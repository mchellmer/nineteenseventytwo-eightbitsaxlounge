apiVersion: apps/v1
kind: Deployment
metadata:
  name: eightbitsaxlounge-overlay
  labels:
    app: eightbitsaxlounge
    component: overlay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eightbitsaxlounge
      component: overlay
  template:
    metadata:
      labels:
        app: eightbitsaxlounge
        component: overlay
    spec:
      containers:
      - name: overlay
        image: ghcr.io/mchellmer/eightbitsaxlounge-overlay:latest
        imagePullPolicy: Always
        env:
        - name: NATS_URL
          value: "nats://eightbitsaxlounge-state-client:4222"
        - name: NATS_USER
          value: "overlay"
        - name: NATS_PASS
          valueFrom:
            secretKeyRef:
              name: state-nats-creds
              key: overlay_pass
        - name: PORT
          value: "3000"
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        # startupProbe: waits up to 5 minutes (30 × 10s) for NATS to be available
        # before handing off to liveness/readiness probes. Prevents CrashLoopBackOff
        # when the state layer is restarting at the same time as the overlay.
        startupProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 2
          periodSeconds: 10
          failureThreshold: 30
        # livenessProbe: restarts the container if the HTTP server stops responding
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        # readinessProbe: removes pod from service endpoints while NATS is disconnected
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
