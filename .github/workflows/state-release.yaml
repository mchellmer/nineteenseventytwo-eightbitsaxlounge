name: State Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - state/*
    paths:
      - 'state/version.txt'

jobs:
  release:
    name: Release State Component
    permissions:
      packages: write
      security-events: write
    uses: ./.github/workflows/release-template.yaml
    with:
      component: 'state'
      test-target: 'test'
      build-target: 'build'
      deploy-target: 'deploy'
      requires-docker-login: true
    secrets:
      component-secrets: |
        {
          "SYSTEM_PASS": "${{ secrets.STATE_SYSTEM_PASS }}",
          "OVERLAY_PASS": "${{ secrets.STATE_OVERLAY_PASS }}",
          "UI_PASS": "${{ secrets.STATE_UI_PASS }}",
          "MIDI_PASS": "${{ secrets.STATE_MIDI_PASS }}",
          "DATA_PASS": "${{ secrets.STATE_DATA_PASS }}"
        }
