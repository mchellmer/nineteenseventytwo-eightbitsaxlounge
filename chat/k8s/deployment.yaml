apiVersion: apps/v1
kind: Deployment
metadata:
  name: eightbitsaxlounge-chat
  labels:
    app: eightbitsaxlounge
    component: chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eightbitsaxlounge
      component: chat
  template:
    metadata:
      labels:
        app: eightbitsaxlounge
        component: chat
        version: "{{ lookup('env', 'VERSION') | default('latest', true) }}"
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: twitch-bot
        image: ghcr.io/mchellmer/eightbitsaxlounge-chat:{{ lookup('env', 'VERSION') | default('latest', true) }}
        imagePullPolicy: IfNotPresent
        env:
        # Twitch Configuration
        - name: TWITCH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: eightbitsaxlounge-chat-secrets
              key: client-id
        - name: TWITCH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: eightbitsaxlounge-chat-secrets
              key: client-secret
        - name: TWITCH_CHANNEL
          valueFrom:
            configMapKeyRef:
              name: eightbitsaxlounge-chat-config
              key: twitch_channel
        - name: TWITCH_BOT_ID
          valueFrom:
            configMapKeyRef:
              name: eightbitsaxlounge-chat-config
              key: bot_id
        - name: TWITCH_OWNER_ID
          valueFrom:
            configMapKeyRef:
              name: eightbitsaxlounge-chat-config
              key: bot_owner_id
        - name: TWITCH_PREFIX
          value: "!"
        # MIDI Configuration
        - name: MIDI_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: eightbitsaxlounge-chat-secrets
              key: midi-client-id
        - name: MIDI_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: eightbitsaxlounge-chat-secrets
              key: midi-client-secret
        - name: MIDI_DEVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eightbitsaxlounge-chat-config
              key: midi_device_url
        - name: MIDI_API_TIMEOUT
          value: "30"
        - name: MIDI_DEVICE_NAME
          value: "One Series Ventris Reverb"
        # Bot Configuration
        - name: BOT_NAME
          valueFrom:
            configMapKeyRef:
              name: eightbitsaxlounge-chat-config
              key: bot_name
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: eightbitsaxlounge-chat-config
              key: log_level
        - name: NATS_URL
          valueFrom:
            configMapKeyRef:
              name: eightbitsaxlounge-chat-config
              key: nats_url
        - name: NATS_USER
          valueFrom:
            configMapKeyRef:
              name: eightbitsaxlounge-chat-config
              key: nats_user
        - name: NATS_PASS
          valueFrom:
            secretKeyRef:
              name: state-nats-creds
              key: chat_pass
        ports:
        - containerPort: 8080
          name: health
        volumeMounts:
        - name: tokens-volume
          mountPath: /app/tokens
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 2
          failureThreshold: 30
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: tokens-volume
        persistentVolumeClaim:
          claimName: eightbitsaxlounge-chat-tokens
      restartPolicy: Always